<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroCore | Professional Agricultural Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/home.css">
</head>
<body>
    <!-- Professional Fixed Nav -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">AGRO<span>CORE</span></div>
            <div class="breadcrumb">
                <span class="breadcrumb-item active" data-page="home">Home</span>
            </div>
            <div class="nav-spacer"></div>
        </div>
    </nav>

    <!-- The "Window Frame" -->
    <div class="outer-frame">
        <main class="scrollable-glass" id="main-content">
            <!-- Content will be dynamically loaded here -->
        </main>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-spinner" id="loading-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Page Container (holds all page content) -->
    <div id="page-container"></div>

    <!-- Core SPA Engine -->
    <script src="js/page-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
